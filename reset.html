<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Reset — Sucatão do Major</title>
<style>
  body { font-family: sans-serif; background: #0e0f11; color: #f0f0ee; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .box { background: #161719; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 2rem; max-width: 420px; width: 90%; text-align: center; }
  h2 { margin-bottom: 8px; font-size: 18px; }
  p { font-size: 13px; color: #888; margin-bottom: 24px; line-height: 1.6; }
  button { display: block; width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 10px; font-family: sans-serif; }
  .red { background: #f06060; color: #fff; }
  .green { background: #22c48a; color: #0a1a12; }
  .muted { background: #1e2023; color: #888; border: 1px solid rgba(255,255,255,0.1); }
  #log { margin-top: 20px; font-size: 12px; color: #22c48a; font-family: monospace; text-align: left; background: #0e0f11; padding: 12px; border-radius: 8px; min-height: 60px; white-space: pre-wrap; display: none; }
</style>
</head>
<body>
<div class="box">
  <h2>🗑 Reset de dados</h2>
  <p>Use esta página para limpar os dados salvos no navegador quando o botão ⚙ do dashboard não funcionar.</p>
  <button class="red" onclick="clearAll()">Apagar TUDO (cadastro + vendas + canceladas)</button>
  <button class="muted" onclick="clearKey('sucatao_fotos_v2')">Apagar só Cadastro</button>
  <button class="muted" onclick="clearKey('sucatao_vendas_v2')">Apagar só Vendas</button>
  <button class="muted" onclick="clearKey('sucatao_canc_v1')">Apagar só Canceladas</button>
  <button class="green" onclick="goBack()">← Voltar ao dashboard</button>
  <div id="log"></div>
</div>
<script>
const log = document.getElementById('log');
function print(msg) {
  log.style.display = 'block';
  log.textContent += msg + '\n';
}

function clearKey(key) {
  try {
    const before = localStorage.getItem(key);
    if (before) {
      localStorage.removeItem(key);
      const after = localStorage.getItem(key);
      if (!after) print('✓ Apagado: ' + key);
      else print('✗ Falhou ao apagar: ' + key);
    } else {
      print('— Chave não existia: ' + key);
    }
  } catch(e) {
    print('ERRO: ' + e.message);
  }
}

function clearAll() {
  log.textContent = '';
  log.style.display = 'block';
  const keys = ['sucatao_fotos_v2','sucatao_vendas_v2','sucatao_canc_v1','sucatao_gh_token'];
  keys.forEach(clearKey);
  // tenta também limpar tudo
  try {
    const total = localStorage.length;
    print('— Total de chaves no localStorage: ' + total);
    // lista todas as chaves
    for (let i = 0; i < localStorage.length; i++) {
      print('  chave['+i+']: ' + localStorage.key(i));
    }
  } catch(e) {}
  print('\nRecarregue o dashboard agora.');
}

function goBack() {
  window.location.href = 'index.html';
}

// mostra o que tem no localStorage ao abrir
window.onload = () => {
  try {
    print('Chaves atuais no localStorage:');
    if (localStorage.length === 0) {
      print('  (vazio)');
    } else {
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        const v = localStorage.getItem(k);
        const size = v ? (v.length/1024).toFixed(1)+'KB' : '0';
        print('  '+k+' ('+size+')');
      }
    }
  } catch(e) {
    print('ERRO ao ler localStorage: ' + e.message);
  }
};
</script>
</body>
</html>
